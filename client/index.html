<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Webimot - Digital Marketing & Automation Agency</title>
    <meta
      name="description"
      content="Expert marketing and automation solutions for medical tourism clinics, real estate, and service businesses. 24/7 WhatsApp automation, SEO, and intelligent analytics."
    />
    <meta
      name="keywords"
      content="medical tourism marketing, AI automation, WhatsApp AI agent, lead generation, hair transplant Turkey, dental clinics Turkey, cosmetic surgery Istanbul, IVF clinics Turkey, digital marketing, SEO, website design, clinic marketing"
    />
    <meta name="author" content="Webimot" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Webimot" />
    <meta
      property="og:title"
      content="Webimot - Digital Marketing & Automation Agency"
    />
    <meta
      property="og:description"
      content="Expert marketing and automation solutions for medical tourism clinics, real estate, and service businesses."
    />
    <meta property="og:url" content="https://webimot.com/" />
    <meta property="og:image" content="https://webimot.com/og-image.png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Webimot - Digital Marketing & Automation Agency"
    />
    <meta
      name="twitter:description"
      content="Expert marketing and automation solutions for medical tourism clinics, real estate, and service businesses."
    />
    <meta name="twitter:image" content="https://webimot.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo1.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts - Optimized loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Webimot",
        "description": "Digital marketing and automation agency specializing in lead generation, website design, and AI automation for medical tourism clinics in Turkey. Services include AI agents, SEO, and digital marketing for hair transplant, dental, cosmetic, and IVF clinics",
        "url": "https://webimot.com",
        "logo": "https://webimot.com/logo.png",
        "sameAs": [
          "https://www.linkedin.com/company/webimot",
          "https://twitter.com/webimot"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "sales",
          "availableLanguage": ["English", "Turkish"]
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Istanbul",
          "addressCountry": "Turkey"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Webimot",
        "url": "https://webimot.com"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
