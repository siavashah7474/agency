    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Webimot Agency",
      "alternateName": "Webimot",
      "description": "AI automation and digital marketing agency specializing in business automation, Shopify eCommerce, WhatsApp AI agents, SEO, Meta Ads, and Google Ads. Serving medical tourism clinics, real estate agencies, eCommerce brands, and businesses worldwide.",
      "url": "https://webimotagency.com",
      "logo": "https://webimotagency.com/logo.png",
      "image": "https://webimotagency.com/og-image.png",
      "priceRange": "$$",
      "areaServed": "Worldwide",
      "serviceType": [
        "AI Automation",
        "Digital Marketing",
        "Shopify eCommerce Automation",
        "WhatsApp AI Agent",
        "SEO",
        "Meta Ads",
        "Google Ads",
        "Lead Generation",
        "Marketing Automation"
      ],
      "sameAs": [
        "https://www.linkedin.com/company/webimot",
        "https://twitter.com/webimot"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["English", "Turkish", "Arabic", "German", "Russian"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Amsterdam",
        "addressCountry": "NL"
      }
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Webimot Agency",
      "url": "https://webimotagency.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://webimotagency.com/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: FAQPage for homepage FAQs -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is an AI automation agency?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An AI automation agency builds systems that replace repetitive manual tasks with AI — like answering leads on WhatsApp 24/7, automating inventory management for Shopify stores, generating SEO content automatically, and delivering marketing analytics on autopilot."
          }
        },
        {
          "@type": "Question",
          "name": "How does Webimot Agency help eCommerce and Shopify stores?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We automate product research (finding trending winners before competitors), inventory management, dynamic pricing, abandoned cart email/SMS flows, bulk AI product descriptions, and weekly revenue dashboards — so your store runs itself."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly can I see results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most clients see initial results within the first 2 weeks. Abandoned cart flows and AI lead responses start working immediately. Full automation stacks typically show 2-4x revenue growth within 60-90 days."
          }
        }
      ]
    }
    </script>
